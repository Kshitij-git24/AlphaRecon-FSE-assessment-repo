<section class="users-page">
  <mat-card class="users-table-card">
    <mat-card-header class="card-header">
      <mat-card-title>Users</mat-card-title>
      <button mat-flat-button color="primary" type="button" class="add-user-button" (click)="openCreateForm()">
        <mat-icon>add</mat-icon>
        Add User
      </button>
    </mat-card-header>

    <mat-card-content>
      @if (loading) {
        <div class="state-container">
          <mat-spinner diameter="36"></mat-spinner>
        </div>
      } @else if (dataSource.data.length === 0) {
        <div class="state-container">
          <p>No users available. Create your first user.</p>
        </div>
      } @else {
        <div class="table-wrapper">
          <table mat-table [dataSource]="dataSource" class="users-table">
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Name</th>
              <td mat-cell *matCellDef="let user">{{ user.name }}</td>
            </ng-container>

            <ng-container matColumnDef="email">
              <th mat-header-cell *matHeaderCellDef>Email</th>
              <td mat-cell *matCellDef="let user">{{ user.email }}</td>
            </ng-container>

            <ng-container matColumnDef="note">
              <th mat-header-cell *matHeaderCellDef>Note</th>
              <td mat-cell *matCellDef="let user">{{ user.note || '-' }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let user">
                <div class="action-buttons">
                  <button
                    mat-icon-button
                    type="button"
                    class="action-button edit-button"
                    aria-label="Edit user"
                    (click)="openEditForm(user)"
                  >
                  <mat-icon>edit</mat-icon>
                  </button>
                  <button
                    mat-icon-button
                    color="warn"
                    type="button"
                    class="action-button delete-button"
                    aria-label="Delete user"
                    (click)="confirmDelete(user)"
                  >
                    <mat-icon>delete</mat-icon>
                  </button>
                </div>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>
      }
    </mat-card-content>
  </mat-card>

  @if (showForm) {
    <mat-card class="user-form-card">
      <mat-card-header class="form-card-header">
        <mat-card-title>{{ selectedUser ? 'Update User' : 'Create User' }}</mat-card-title>
      </mat-card-header>
      <mat-card-content class="form-card-content">
        <app-user-form
          [user]="selectedUser"
          [submitting]="submitting"
          (formSubmit)="saveUser($event)"
          (cancel)="closeForm()"
        />
      </mat-card-content>
    </mat-card>
  }
</section>
